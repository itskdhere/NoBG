version: 2

updates:
  # npm / pnpm ecosystem
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dependencies:
        patterns:
          - "*"

  # Python pip ecosystem
  - package-ecosystem: "pip"
    directory: "/apps/worker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns:
          - "*"

  # Docker ecosystem
  - package-ecosystem: "docker"
    directory: "/apps/worker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      dependencies:
        patterns:
          - "*"
